version: '3.8'

services:
    web:
        build: ./docker
        restart: always
        volumes:
            - .:/var/www/html
        environment:
            DEBUG: 'true'
            PHP_IDE_CONFIG: "serverName=_"
            XDEBUG_SESSION: '_'
            # Internal communication uses port 3306
            DATABASE_URL: "mysql://root:root@db:3306/vtc-db?serverVersion=5.7&charset=utf8mb4"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - '81:8080'
        networks:
            - vtc-network
        depends_on:
            - db

    db:
        image: mysql:5.7
        restart: always
        environment:
            MYSQL_DATABASE: 'vtc-db'
            MYSQL_PASSWORD: 'root'
            MYSQL_ROOT_PASSWORD: 'root'
        ports:
            - '3307:3306'
        volumes:
            - vtc-db:/var/lib/mysql
        networks:
            - vtc-network

volumes:
    vtc-db:

networks:
    vtc-network:
        driver: bridge
